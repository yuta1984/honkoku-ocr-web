<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 960" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="13">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#1f2937" />
    </marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#2563eb" />
    </marker>
    <style>
      .t { font-weight: 600; font-size: 14px; fill: #111827; }
      .s { fill: #6b7280; font-size: 11.5px; }
      .d { fill: #111827; font-weight: 500; font-size: 12.5px; }
      .code { font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; fill: #111827; }
      .phase { font-weight: 700; font-size: 11.5px; fill: #4b5563; letter-spacing: 0.08em; }
    </style>
  </defs>

  <!-- Phase labels (left margin) -->
  <text x="36" y="148" class="phase" transform="rotate(-90 36 148)">ENCODER</text>
  <text x="36" y="630" class="phase" transform="rotate(-90 36 630)">DECODER</text>

  <!-- Input -->
  <rect x="180" y="20" width="400" height="64" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" />
  <text x="380" y="44" text-anchor="middle" class="t">入力：行画像</text>
  <text x="380" y="64" text-anchor="middle" class="s">H=128, W=1024, C=3 (RGB)　縦書きは 90° 回転 → 横長化＋白パディング</text>
  <line x1="380" y1="84" x2="380" y2="108" stroke="#1f2937" stroke-width="1.6" marker-end="url(#ah)" />

  <!-- ConvNeXt -->
  <rect x="180" y="108" width="400" height="76" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
  <text x="380" y="132" text-anchor="middle" class="t">ConvNeXt-Base（画像エンコーダ）</text>
  <text x="380" y="152" text-anchor="middle" class="s">約 88M パラメータ・ImageNet-22k → 1k 事前学習</text>
  <text x="380" y="170" text-anchor="middle" class="s">累積ストライド /32</text>
  <line x1="380" y1="184" x2="380" y2="208" stroke="#1f2937" stroke-width="1.6" marker-end="url(#ah)" />

  <!-- Feature map -->
  <rect x="240" y="208" width="280" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" />
  <text x="380" y="232" text-anchor="middle" class="t">特徴マップ</text>
  <text x="380" y="252" text-anchor="middle" class="d">4 × 32 × 1024（＝ 128 トークン）</text>
  <line x1="380" y1="264" x2="380" y2="288" stroke="#1f2937" stroke-width="1.6" marker-end="url(#ah)" />

  <!-- 2D PE -->
  <rect x="180" y="288" width="400" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
  <text x="380" y="312" text-anchor="middle" class="t">2 次元位置埋め込み</text>
  <text x="380" y="332" text-anchor="middle" class="s">row_emb (8 × 1024) ＋ col_emb (40 × 1024)</text>
  <text x="380" y="350" text-anchor="middle" class="s">→ LayerNorm → flatten</text>
  <line x1="380" y1="368" x2="380" y2="392" stroke="#1f2937" stroke-width="1.6" marker-end="url(#ah)" />

  <!-- Projection -->
  <rect x="240" y="392" width="280" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
  <text x="380" y="416" text-anchor="middle" class="t">enc_to_dec_proj</text>
  <text x="380" y="436" text-anchor="middle" class="d">1024 → 512</text>
  <line x1="380" y1="448" x2="380" y2="472" stroke="#1f2937" stroke-width="1.6" marker-end="url(#ah)" />

  <!-- Encoder hidden states -->
  <rect x="240" y="472" width="280" height="56" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" />
  <text x="380" y="496" text-anchor="middle" class="t">encoder_hidden_states</text>
  <text x="380" y="516" text-anchor="middle" class="d">128 × 512</text>

  <!-- cross-attention arrow -->
  <path d="M380 528 V 564" stroke="#2563eb" stroke-width="1.8" stroke-dasharray="5 4" fill="none" marker-end="url(#ahb)" />
  <text x="394" y="550" class="s" fill="#2563eb" font-weight="600">cross-attention</text>

  <!-- Decoder -->
  <rect x="120" y="564" width="520" height="160" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
  <text x="380" y="588" text-anchor="middle" class="t">RoBERTa Decoder × 6 layers</text>
  <text x="380" y="606" text-anchor="middle" class="s">d_model = 512, heads = 8</text>
  <rect x="220" y="618" width="320" height="68" rx="6" fill="#ffffff" stroke="#cbd5e1" />
  <text x="380" y="638" text-anchor="middle" class="s">Self-Attention（因果マスク）</text>
  <text x="380" y="656" text-anchor="middle" class="s">Cross-Attention（← エンコーダ）</text>
  <text x="380" y="674" text-anchor="middle" class="s">Feed-Forward</text>
  <text x="380" y="708" text-anchor="middle" class="s" font-style="italic">自己回帰生成：&lt;CLS&gt; → … → &lt;SEP&gt;</text>
  <line x1="380" y1="724" x2="380" y2="748" stroke="#1f2937" stroke-width="1.6" marker-end="url(#ah)" />

  <!-- LM head -->
  <rect x="180" y="748" width="400" height="78" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" />
  <text x="380" y="772" text-anchor="middle" class="t">LM head → softmax → argmax</text>
  <text x="380" y="792" text-anchor="middle" class="s">語彙 5,000（本文 4,989 ＋ 構造特殊 11）</text>
  <text x="380" y="810" text-anchor="middle" class="s">greedy（KV キャッシュ無し）, 最大 192 トークン</text>
  <line x1="380" y1="826" x2="380" y2="850" stroke="#1f2937" stroke-width="1.6" marker-end="url(#ah)" />

  <!-- Output -->
  <rect x="80" y="850" width="600" height="68" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" />
  <text x="380" y="874" text-anchor="middle" class="t">出力：翻刻文（Koji 記法）</text>
  <text x="380" y="900" text-anchor="middle" class="code">賤者&lt;OKURI&gt;ノ&lt;/OKURI&gt;病不＿レ尽＿レ治&lt;OKURI&gt;ヲ&lt;/OKURI&gt;</text>

  <!-- Legend -->
  <g transform="translate(60, 932)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" />
    <text x="20" y="12" class="s">入力</text>
    <rect x="70" y="0" width="14" height="14" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2" />
    <text x="90" y="12" class="s">処理層</text>
    <rect x="150" y="0" width="14" height="14" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.2" />
    <text x="170" y="12" class="s">中間データ</text>
    <rect x="248" y="0" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2" />
    <text x="268" y="12" class="s">出力</text>
  </g>
</svg>
